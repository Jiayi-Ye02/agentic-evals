name: Skill Evaluation (Gemini CLI)

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: "Target to evaluate (e.g. agora)"
        required: true
        default: "agora"
      suite_ids:
        description: "Comma-separated suite IDs, or 'all' for defaults"
        required: false
        default: "all"
      case_id:
        description: "Single case ID (leave empty for full suite)"
        required: false
        default: ""
      model:
        description: "Gemini model (e.g. gemini-2.5-pro)"
        required: false
        default: ""
      skill_repo:
        description: "GitHub owner/repo of the skill repo (e.g. AgoraIO/skills)"
        required: false
        default: ""
      skill_repo_ref:
        description: "Git ref (branch/tag/sha) of the skill repo to test"
        required: false
        default: ""

  pull_request:
    paths:
      - "targets/**/*.yaml"
      - ".agents/skills/**"
      - ".github/workflows/**"

env:
  TARGET_ID: ${{ github.event.inputs.target_id || 'agora' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Validate YAML
        env:
          TARGET_ID: ${{ env.TARGET_ID }}
        run: |
          ruby -e '
            require "yaml"
            tid = ENV.fetch("TARGET_ID")
            Dir["targets/#{tid}/cases/*/suite.yaml"].sort.each { |f| YAML.load_file(f) }
            Dir["targets/#{tid}/cases/**/*.yaml"].sort.reject { |f| f.end_with?("suite.yaml") }.each { |f| YAML.load_file(f) }
            YAML.load_file("targets/#{tid}/target.yaml")
            puts "yaml-ok"
          '

  evaluate:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          pip install pyyaml
          npm install -g agent-browser

      - name: Sync external skill repo
        env:
          SKILL_REPO: ${{ github.event.inputs.skill_repo || 'AgoraIO/skills' }}
          SKILL_REF: ${{ github.event.inputs.skill_repo_ref || 'main' }}
        run: |
          if [ -d .agents/skills/agora ] && [ -f .agents/skills/agora/SKILL.md ]; then
            echo "Agora skill already present, skipping sync"
            exit 0
          fi
          echo "Cloning skill repo: ${SKILL_REPO} @ ${SKILL_REF}"
          git clone "https://github.com/${SKILL_REPO}.git" /tmp/skill-repo
          git -C /tmp/skill-repo checkout "${SKILL_REF}"
          rm -rf .agents/skills/agora
          mkdir -p .agents/skills/agora
          if [ -d /tmp/skill-repo/skills/agora ]; then
            cp -r /tmp/skill-repo/skills/agora/* .agents/skills/agora/
          else
            echo "::error::skills/agora/ not found in skill repo ${SKILL_REPO}"
            exit 1
          fi
          echo "Skill synced from ${SKILL_REPO}@${SKILL_REF}"

      - name: Write credentials file
        env:
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
        run: |
          cat > /tmp/agora-credentials.env << EOF
          AGORA_APP_ID=${AGORA_APP_ID}
          AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
          EOF
          chmod 600 /tmp/agora-credentials.env

      - name: Configure Gemini CLI
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << 'JSON'
          {
            "agents": {
              "overrides": {
                "browser_agent": { "enabled": true }
              },
              "browser": {
                "sessionMode": "isolated",
                "headless": true
              }
            }
          }
          JSON

      - name: Build evaluator prompt
        env:
          SUITE_IDS: ${{ github.event.inputs.suite_ids || 'all' }}
          CASE_ID: ${{ github.event.inputs.case_id || '' }}
          IS_PR: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: |
          EFFECTIVE_CASE_ID="${CASE_ID}"
          EFFECTIVE_SUITE_IDS="${SUITE_IDS}"
          if [ "$IS_PR" = "true" ] && [ -z "$EFFECTIVE_CASE_ID" ]; then
            EFFECTIVE_CASE_ID="convoai-e2e-first-success"
            EFFECTIVE_SUITE_IDS="workflow"
          fi

          cat > /tmp/eval-prompt.txt << 'HEREDOC'
          You are the skill-eval evaluator agent running in Gemini CLI.

          Instructions:
          1. Read AGENT.md (canonical repo contract).
          2. Read .agents/skills/skills-evaluation/SKILL.md (operational instructions).
          3. Read docs/session-evidence.md (evidence contract).

          Runtime: Gemini CLI
          - For each case, create an isolated workspace using:
            bash .agents/skills/skills-evaluation/scripts/create_case_workspace.sh
          - Use the @generalist_agent subagent to delegate each case execution.
            Send the case user_prompt to the subagent with the workspace path.
            Do NOT include assertions or expected behavior in the subagent prompt.
          - After the subagent returns, capture its full response as the accepted evidence.
          - Write the subagent response to case-artifacts/<case_id>/accepted-session.json
          - Extract the final answer to case-artifacts/<case_id>/final-answer.txt
          - Judge assertions from the captured evidence.
          - Write all artifacts under runs/<run_id>/.

          Evidence collection (Gemini CLI):
          - Since Gemini CLI does not produce session JSONL like Codex, capture evidence from:
            1. The subagent's returned summary (tool calls, file reads, commands executed).
            2. The workspace state after execution (files created/modified).
            3. Any shell command outputs observed in the subagent response.
          - Record evidence_mode as "gemini-cli-subagent-response" in manifest.json.

          Timing requirements:
          - Record wall-clock timestamps (ISO 8601 UTC) for each case.
          - Track two phases separately:
            - "Task execution": from agent receiving the prompt to delivering its final answer.
            - "Verification": from evidence collection start to all artifacts written.
          - In report.md, include a "## Timing" section with a human-readable table:
            | case_id | task_execution | verification | total |
            Use human-friendly durations like "3m 12s" instead of raw seconds.
          - In each case-results/<case_id>.json, include:
            - "task_started_at", "task_completed_at", "task_duration_s"
            - "verification_started_at", "verification_completed_at", "verification_duration_s"
            - "total_duration_s"

          Report quality requirements:
          - report.md must be useful to a human reading it for the first time.
          - For each failed assertion, explain WHAT went wrong with specifics:
            - Quote the actual command or output that was observed (or missing).
            - Example good: "Agent wrote .env.local but AGORA_APP_ID was empty because $AGORA_APP_ID was not exported in the shell."
            - Example bad: "Env mapping assertion failed."
          - For each passed assertion, include a one-line evidence summary.
          - The "Suggested Next Fixes" section must include concrete actions, not just file paths:
            - Example good: "In quickstarts.md, add a step to verify env vars are non-empty before starting the dev server."
            - Example bad: ".agents/skills/agora/references/conversational-ai/quickstarts.md"
          - If the evaluator browser verification was skipped or degraded, note it clearly but do not fail the case for evaluator-side limitations.

          Screenshot requirements:
          - When performing browser verification, save screenshots to case-artifacts/<case_id>/:
            - page-loaded.png: after the page finishes loading
            - after-interaction.png: after clicking the start/connect button (if applicable)
          - Use agent-browser screenshot commands to capture these.
          - If screenshots cannot be taken, note it in the case result but do not fail the case.
          HEREDOC

          echo "" >> /tmp/eval-prompt.txt
          echo "Agora credentials file: /tmp/agora-credentials.env" >> /tmp/eval-prompt.txt
          echo "Before delegating each case, source this file so AGORA_APP_ID and AGORA_APP_CERTIFICATE are exported." >> /tmp/eval-prompt.txt
          echo "Do NOT echo or log the credential values." >> /tmp/eval-prompt.txt
          echo "" >> /tmp/eval-prompt.txt
          echo "Run parameters:" >> /tmp/eval-prompt.txt
          echo "- test repo path: $(pwd)" >> /tmp/eval-prompt.txt
          echo "- target_id: ${TARGET_ID}" >> /tmp/eval-prompt.txt
          echo "- run_mode: single-run" >> /tmp/eval-prompt.txt

          if [ "$EFFECTIVE_SUITE_IDS" != "all" ]; then
            echo "- suite_ids: ${EFFECTIVE_SUITE_IDS}" >> /tmp/eval-prompt.txt
          else
            echo "- suite_ids: use target defaults" >> /tmp/eval-prompt.txt
          fi

          if [ -n "$EFFECTIVE_CASE_ID" ]; then
            echo "- case_id: ${EFFECTIVE_CASE_ID}" >> /tmp/eval-prompt.txt
          fi

          echo "" >> /tmp/eval-prompt.txt
          echo "Begin the evaluation now." >> /tmp/eval-prompt.txt

          PROMPT=$(cat /tmp/eval-prompt.txt)
          echo "EVAL_PROMPT<<PROMPT_EOF" >> "$GITHUB_ENV"
          echo "$PROMPT" >> "$GITHUB_ENV"
          echo "PROMPT_EOF" >> "$GITHUB_ENV"

      - name: Run Gemini CLI evaluator
        id: run_gemini
        uses: google-github-actions/run-gemini-cli@v1
        env:
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ github.event.inputs.model || '' }}
          prompt: ${{ env.EVAL_PROMPT }}

      - name: Locate run artifacts
        id: artifacts
        run: |
          LATEST_RUN=$(ls -td runs/*/ 2>/dev/null | head -1)
          if [ -z "$LATEST_RUN" ]; then
            echo "::warning::No run directory found"
            echo "run_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_dir=${LATEST_RUN}" >> "$GITHUB_OUTPUT"
          echo "run_found=true" >> "$GITHUB_OUTPUT"
          [ -f "${LATEST_RUN}/report.md" ] \
            && echo "report_exists=true" >> "$GITHUB_OUTPUT" \
            || echo "report_exists=false" >> "$GITHUB_OUTPUT"

      - name: Upload run artifacts
        if: steps.artifacts.outputs.run_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-gemini-${{ env.TARGET_ID }}-${{ github.run_id }}
          path: ${{ steps.artifacts.outputs.run_dir }}
          retention-days: 30

      - name: Post report to job summary
        if: steps.artifacts.outputs.report_exists == 'true'
        run: |
          echo "## Skill Eval Report (Gemini CLI)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.artifacts.outputs.run_dir }}/report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Post report as PR comment
        if: >
          github.event_name == 'pull_request' &&
          steps.artifacts.outputs.report_exists == 'true'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.artifacts.outputs.run_dir }}/report.md
          RUN_DIR: ${{ steps.artifacts.outputs.run_dir }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            let report = fs.readFileSync(process.env.REPORT_PATH, 'utf8');

            const runDir = process.env.RUN_DIR;
            const artifactsDir = path.join(runDir, 'case-artifacts');
            if (fs.existsSync(artifactsDir)) {
              const cases = fs.readdirSync(artifactsDir);
              const screenshots = [];
              for (const caseId of cases) {
                const caseDir = path.join(artifactsDir, caseId);
                if (!fs.statSync(caseDir).isDirectory()) continue;
                for (const file of fs.readdirSync(caseDir)) {
                  if (file.endsWith('.png') || file.endsWith('.jpg')) {
                    const filePath = path.join(caseDir, file);
                    const data = fs.readFileSync(filePath, { encoding: 'base64' });
                    const ext = path.extname(file).slice(1);
                    screenshots.push({ caseId, file, data, ext });
                  }
                }
              }
              if (screenshots.length > 0) {
                report += '\n\n## Screenshots\n\n';
                for (const s of screenshots) {
                  report += `### ${s.caseId} / ${s.file}\n\n`;
                  report += `<img src="data:image/${s.ext};base64,${s.data}" width="800" />\n\n`;
                }
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Skill Eval Report (Gemini CLI)\n\n${report}`,
            });

      - name: Report results
        if: steps.artifacts.outputs.run_found == 'true'
        run: |
          RUN_DIR="${{ steps.artifacts.outputs.run_dir }}"
          RESULTS_DIR="${RUN_DIR}/case-results"
          [ -d "$RESULTS_DIR" ] || { echo "::warning::No case-results"; exit 0; }
          FAIL=$(grep -rl '"status": "fail"' "$RESULTS_DIR" 2>/dev/null | wc -l || echo 0)
          PASS=$(grep -rl '"status": "pass"' "$RESULTS_DIR" 2>/dev/null | wc -l || echo 0)
          BLOCKED=$(grep -rl '"status": "blocked"' "$RESULTS_DIR" 2>/dev/null | wc -l || echo 0)
          echo "Results: ${PASS} pass, ${FAIL} fail, ${BLOCKED} blocked"
          if [ "$FAIL" -gt 0 ]; then
            echo "::warning::${FAIL} case(s) failed — see report for details"
          fi
