name: Skill Evaluation (Gemini CLI)

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: "Target to evaluate (e.g. agora)"
        required: true
        default: "agora"
      suite_ids:
        description: "Comma-separated suite IDs, or 'all' for defaults"
        required: false
        default: "all"
      case_id:
        description: "Single case ID (leave empty for full suite)"
        required: false
        default: ""
      model:
        description: "Gemini model (e.g. gemini-2.5-pro)"
        required: false
        default: ""
      skill_repo:
        description: "GitHub owner/repo of the skill repo (e.g. AgoraIO/skills)"
        required: false
        default: ""
      skill_repo_ref:
        description: "Git ref (branch/tag/sha) of the skill repo to test"
        required: false
        default: ""

  pull_request:
    paths:
      - "targets/**/*.yaml"
      - ".agents/skills/**"
      - ".github/workflows/**"

env:
  TARGET_ID: ${{ github.event.inputs.target_id || 'agora' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Validate YAML
        env:
          TARGET_ID: ${{ env.TARGET_ID }}
        run: |
          ruby -e '
            require "yaml"
            tid = ENV.fetch("TARGET_ID")
            Dir["targets/#{tid}/cases/*/suite.yaml"].sort.each { |f| YAML.load_file(f) }
            Dir["targets/#{tid}/cases/**/*.yaml"].sort.reject { |f| f.end_with?("suite.yaml") }.each { |f| YAML.load_file(f) }
            YAML.load_file("targets/#{tid}/target.yaml")
            puts "yaml-ok"
          '

  evaluate:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          pip install pyyaml
          npm install -g agent-browser @google/gemini-cli

      - name: Sync external skill repo
        env:
          SKILL_REPO: ${{ github.event.inputs.skill_repo || 'AgoraIO/skills' }}
          SKILL_REF: ${{ github.event.inputs.skill_repo_ref || 'main' }}
        run: |
          if [ -d .agents/skills/agora ] && [ -f .agents/skills/agora/SKILL.md ]; then
            echo "Agora skill already present, skipping sync"
            exit 0
          fi
          git clone "https://github.com/${SKILL_REPO}.git" /tmp/skill-repo
          git -C /tmp/skill-repo checkout "${SKILL_REF}"
          rm -rf .agents/skills/agora
          mkdir -p .agents/skills/agora
          if [ -d /tmp/skill-repo/skills/agora ]; then
            cp -r /tmp/skill-repo/skills/agora/* .agents/skills/agora/
          else
            echo "::error::skills/agora/ not found in skill repo ${SKILL_REPO}"
            exit 1
          fi

      - name: Write credentials file
        env:
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
        run: |
          cat > /tmp/agora-credentials.env << EOF
          AGORA_APP_ID=${AGORA_APP_ID}
          AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
          EOF
          chmod 600 /tmp/agora-credentials.env

      - name: Resolve cases and prepare workspaces
        id: resolve
        env:
          SUITE_IDS: ${{ github.event.inputs.suite_ids || 'all' }}
          CASE_ID: ${{ github.event.inputs.case_id || '' }}
          IS_PR: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: |
          pip install pyyaml -q
          python3 << 'PY'
          import yaml, json, os, datetime

          target_id = os.environ["TARGET_ID"]
          suite_ids = os.environ.get("SUITE_IDS", "all")
          case_id = os.environ.get("CASE_ID", "")
          is_pr = os.environ.get("IS_PR", "false")

          if is_pr == "true" and not case_id:
              case_id = "convoai-e2e-first-success"
              suite_ids = "workflow"

          target = yaml.safe_load(open(f"targets/{target_id}/target.yaml"))

          if suite_ids == "all":
              suite_ids = target["default_suites"]
          else:
              suite_ids = [s.strip() for s in suite_ids.split(",")]

          cases = []
          for sid in suite_ids:
              suite = yaml.safe_load(open(f"targets/{target_id}/cases/{sid}/suite.yaml"))
              for case_path in suite["cases"]:
                  c = yaml.safe_load(open(case_path))
                  if case_id and c["case_id"] != case_id:
                      continue
                  cases.append({"case_id": c["case_id"], "path": case_path, "user_prompt": c["input"]["user_prompt"]})

          run_id = f"gemini-{datetime.datetime.utcnow().strftime('%Y%m%dT%H%M%SZ')}"
          run_dir = f"runs/{run_id}"
          os.makedirs(f"{run_dir}/case-artifacts", exist_ok=True)
          os.makedirs(f"{run_dir}/case-results", exist_ok=True)

          manifest = {
              "run_mode": "single-run",
              "run_id": run_id,
              "runtime": "gemini-cli",
              "target_id": target_id,
              "suite_ids": suite_ids,
              "case_ids": [c["case_id"] for c in cases],
              "target_skill_path": target["entry_skill"],
              "started_at": datetime.datetime.utcnow().isoformat() + "Z",
              "evidence_mode": "gemini-cli-two-phase",
          }
          with open(f"{run_dir}/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"run_id={run_id}\n")
              out.write(f"run_dir={run_dir}\n")
              out.write(f"cases={json.dumps(cases)}\n")
          PY

      - name: Run two-phase evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
          RUN_DIR: ${{ steps.resolve.outputs.run_dir }}
          CASES_JSON: ${{ steps.resolve.outputs.cases }}
          GEMINI_MODEL: ${{ github.event.inputs.model || '' }}
        run: |
          source /tmp/agora-credentials.env
          export AGORA_APP_ID AGORA_APP_CERTIFICATE

          MODEL_FLAG=""
          if [ -n "$GEMINI_MODEL" ]; then
            MODEL_FLAG="--model $GEMINI_MODEL"
          fi

          echo "$CASES_JSON" | python3 -c "
          import json, sys, subprocess, os, time, datetime, yaml
          from pathlib import Path

          cases = json.loads(sys.stdin.read())
          run_dir = Path(os.environ['RUN_DIR'])
          model_flag = os.environ.get('MODEL_FLAG', '')
          repo_root = Path.cwd()

          for case in cases:
              cid = case['case_id']
              print(f'\\n===== Case: {cid} =====')

              # Create isolated workspace
              ws = Path(f'/tmp/gemini-eval-{cid}')
              ws.mkdir(parents=True, exist_ok=True)

              # Copy skill files into workspace
              result = subprocess.run(
                  ['bash', '.agents/skills/skills-evaluation/scripts/create_case_workspace.sh',
                   str(repo_root), str(ws), cid, '--target', os.environ['TARGET_ID']],
                  capture_output=True, text=True
              )
              attempt_ws = result.stdout.strip()
              if not attempt_ws:
                  attempt_ws = str(ws)
              print(f'Workspace: {attempt_ws}')

              # --- Phase 1: Task Agent ---
              task_start = datetime.datetime.utcnow()
              print(f'Phase 1: Task agent started at {task_start.isoformat()}Z')

              task_prompt = f'''You are working in workspace: {attempt_ws}

          Task: answer this user request naturally, using the workspace as needed:
          \"{case['user_prompt']}\"

          Requirements:
          - Treat {attempt_ws} as your only workspace.
          - Keep all file reads, writes, and shell commands inside it.
          - Use the skill docs in .agents/skills/ if relevant.
          - Give the exact answer you would send to the user.'''

              cmd = ['gemini', '--yolo', '--prompt', task_prompt, '--output-format', 'json']
              if model_flag:
                  cmd.extend(model_flag.split())

              task_result = subprocess.run(cmd, capture_output=True, text=True, timeout=600,
                                           env={**os.environ, 'HOME': os.environ['HOME']})
              task_end = datetime.datetime.utcnow()
              task_duration = (task_end - task_start).total_seconds()
              print(f'Phase 1: Task agent completed in {task_duration:.0f}s')

              # Save task output
              art_dir = run_dir / 'case-artifacts' / cid
              art_dir.mkdir(parents=True, exist_ok=True)
              (art_dir / 'task-agent-output.json').write_text(task_result.stdout)

              # Extract response
              task_response = ''
              task_tools = {}
              try:
                  task_data = json.loads(task_result.stdout)
                  task_response = task_data.get('response', '')
                  task_tools = task_data.get('stats', {}).get('tools', {}).get('byName', {})
              except:
                  task_response = task_result.stdout

              (art_dir / 'final-answer.txt').write_text(task_response + '\\n')

              # Capture workspace state
              ws_files = subprocess.run(['find', attempt_ws, '-type', 'f', '-maxdepth', '4'],
                                         capture_output=True, text=True).stdout

              # --- Phase 2: Evaluator Agent ---
              eval_start = datetime.datetime.utcnow()
              print(f'Phase 2: Evaluator started at {eval_start.isoformat()}Z')

              # Load case assertions
              case_data = yaml.safe_load(open(case['path']))
              assertions_text = json.dumps(case_data.get('assert', {}).get('required', []), indent=2)

              eval_prompt = f'''You are an independent evaluator. You are judging the work of a DIFFERENT agent.
          You must NOT execute any commands or modify any files. Only read and judge.

          The task agent was given this prompt:
          ---
          {case['user_prompt']}
          ---

          The task agent responded:
          ---
          {task_response}
          ---

          The task agent used these tools: {json.dumps(task_tools)}

          Files in workspace after task agent ran:
          {ws_files}

          Assertions to judge:
          {assertions_text}

          For each assertion, determine PASS or FAIL based on the evidence.
          For FAIL, quote the specific evidence that caused the failure.
          For PASS, give a one-line evidence summary.

          Also check if the demo page is accessible by running: curl -s -o /dev/null -w \"%{{http_code}}\" http://localhost:3000 (if a dev server was started).

          Output ONLY valid JSON:
          {{
            \"case_id\": \"{cid}\",
            \"status\": \"pass or fail\",
            \"assertions\": [{{\"summary\": \"...\", \"status\": \"pass or fail\", \"evidence\": [\"...\"]}}],
            \"notes\": [\"...\"]
          }}'''

              eval_cmd = ['gemini', '--yolo', '--prompt', eval_prompt, '--output-format', 'json']
              if model_flag:
                  eval_cmd.extend(model_flag.split())

              eval_result = subprocess.run(eval_cmd, capture_output=True, text=True, timeout=300,
                                            env={**os.environ, 'HOME': os.environ['HOME']})
              eval_end = datetime.datetime.utcnow()
              eval_duration = (eval_end - eval_start).total_seconds()
              print(f'Phase 2: Evaluator completed in {eval_duration:.0f}s')

              (art_dir / 'evaluator-output.json').write_text(eval_result.stdout)

              # Parse evaluator judgment
              eval_response = ''
              try:
                  eval_data = json.loads(eval_result.stdout)
                  eval_response = eval_data.get('response', '')
              except:
                  eval_response = eval_result.stdout

              # Extract JSON from response (may be wrapped in markdown)
              import re
              json_match = re.search(r'\{[\s\S]*\}', eval_response)
              case_result = {
                  'case_id': cid,
                  'status': 'blocked',
                  'blocked_reason': 'evaluator-parse-error',
                  'assertions': [],
                  'notes': ['Could not parse evaluator response'],
                  'task_started_at': task_start.isoformat() + 'Z',
                  'task_completed_at': task_end.isoformat() + 'Z',
                  'task_duration_s': round(task_duration),
                  'verification_started_at': eval_start.isoformat() + 'Z',
                  'verification_completed_at': eval_end.isoformat() + 'Z',
                  'verification_duration_s': round(eval_duration),
                  'total_duration_s': round(task_duration + eval_duration),
                  'workspace_root': attempt_ws,
              }
              if json_match:
                  try:
                      parsed = json.loads(json_match.group())
                      case_result.update({
                          'status': parsed.get('status', 'blocked'),
                          'assertions': parsed.get('assertions', []),
                          'notes': parsed.get('notes', []),
                          'blocked_reason': None,
                      })
                  except:
                      pass

              (run_dir / 'case-results' / f'{cid}.json').write_text(
                  json.dumps(case_result, indent=2) + '\\n')

              # Save accepted session evidence
              evidence = {
                  'task_agent_session': task_result.stdout[:50000],
                  'evaluator_session': eval_result.stdout[:50000],
                  'workspace_files': ws_files,
              }
              (art_dir / 'accepted-session.json').write_text(
                  json.dumps(evidence, indent=2, ensure_ascii=False) + '\\n')

              print(f'Result: {case_result[\"status\"]}')
          "

      - name: Generate report
        env:
          RUN_DIR: ${{ steps.resolve.outputs.run_dir }}
        run: |
          python3 << 'PY'
          import json, os
          from pathlib import Path

          run_dir = Path(os.environ["RUN_DIR"])
          results_dir = run_dir / "case-results"

          cases = []
          for f in sorted(results_dir.glob("*.json")):
              cases.append(json.loads(f.read_text()))

          total = len(cases)
          passed = sum(1 for c in cases if c["status"] == "pass")
          failed = sum(1 for c in cases if c["status"] == "fail")
          blocked = sum(1 for c in cases if c["status"] == "blocked")

          def fmt_duration(s):
              m, sec = divmod(int(s), 60)
              return f"{m}m {sec}s"

          lines = []
          lines.append("# Skill Eval Report (Gemini CLI)")
          lines.append("")
          lines.append(f"- runtime: gemini-cli (two-phase)")
          lines.append(f"- cases: {total} ({passed} pass, {failed} fail, {blocked} blocked)")
          lines.append("")
          lines.append("## Case Table")
          lines.append("")
          lines.append("| case_id | status |")
          lines.append("|---|---|")
          for c in cases:
              lines.append(f"| {c['case_id']} | {c['status']} |")
          lines.append("")
          lines.append("## Timing")
          lines.append("")
          lines.append("| case_id | task_execution | verification | total |")
          lines.append("|---|---|---|---|")
          for c in cases:
              lines.append(f"| {c['case_id']} | {fmt_duration(c.get('task_duration_s',0))} | {fmt_duration(c.get('verification_duration_s',0))} | {fmt_duration(c.get('total_duration_s',0))} |")
          lines.append("")

          # Assertion details
          lines.append("## Assertion Details")
          lines.append("")
          for c in cases:
              lines.append(f"### {c['case_id']} — {c['status']}")
              for a in c.get("assertions", []):
                  status = a.get("status", "?")
                  summary = a.get("summary", "")
                  evidence = a.get("evidence", [])
                  lines.append(f"- [{status}] {summary}")
                  for e in evidence[:2]:
                      lines.append(f"  - {e}")
              for n in c.get("notes", []):
                  lines.append(f"- note: {n}")
              lines.append("")

          # Suggested fixes
          lines.append("## Suggested Next Fixes")
          lines.append("")
          if failed == 0 and blocked == 0:
              lines.append("None — all cases passed.")
          else:
              for c in cases:
                  if c["status"] != "pass":
                      lines.append(f"- {c['case_id']}: see case-results/{c['case_id']}.json for details")
          lines.append("")

          (run_dir / "report.md").write_text("\n".join(lines))

          # Update manifest
          manifest = json.loads((run_dir / "manifest.json").read_text())
          manifest["completed_at"] = cases[-1].get("verification_completed_at", "") if cases else ""
          manifest["result_counts"] = {"pass": passed, "fail": failed, "blocked": blocked}
          (run_dir / "manifest.json").write_text(json.dumps(manifest, indent=2))

          print(f"Report written: {passed} pass, {failed} fail, {blocked} blocked")
          PY
