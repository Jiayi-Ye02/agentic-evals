name: Skill Evaluation (Kiro)

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: "Target to evaluate (e.g. agora)"
        required: true
        default: "agora"
      suite_ids:
        description: "Comma-separated suite IDs, or 'all' for all suites"
        required: false
        default: "workflow"
      case_id:
        description: "Single case ID (leave empty for full suite)"
        required: false
        default: "convoai-e2e-first-success"
      model:
        description: "Model for Codex evaluator"
        required: false
        default: ""
      run_mode:
        description: "single-run or ab-urls"
        required: false
        default: "single-run"
        type: choice
        options:
          - single-run
          - ab-urls
      variant_a_url:
        description: "Variant A URL (ab-urls only)"
        required: false
        default: ""
      variant_b_url:
        description: "Variant B URL (ab-urls only)"
        required: false
        default: ""
      skill_repo:
        description: "GitHub owner/repo of the skill repo (e.g. AgoraIO/skills)"
        required: false
        default: ""
      skill_repo_ref:
        description: "Git ref (branch/tag/sha) of the skill repo to test"
        required: false
        default: ""

env:
  TARGET_ID: ${{ github.event.inputs.target_id || 'agora' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Validate YAML
        env:
          TARGET_ID: ${{ env.TARGET_ID }}
        run: |
          ruby -e '
            require "yaml"
            tid = ENV.fetch("TARGET_ID")
            Dir["targets/#{tid}/cases/*/suite.yaml"].sort.each { |f| YAML.load_file(f) }
            Dir["targets/#{tid}/cases/**/*.yaml"].sort.reject { |f| f.end_with?("suite.yaml") }.each { |f| YAML.load_file(f) }
            YAML.load_file("targets/#{tid}/target.yaml")
            puts "yaml-ok"
          '

  evaluate:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          pip install pyyaml
          npm install -g agent-browser

      - name: Validate Kiro headless prerequisites
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          [ -n "$KIRO_API_KEY" ] || {
            echo "::error::skill-eval-kiro requires the KIRO_API_KEY secret"
            exit 1
          }

      - name: Install Kiro CLI
        run: |
          curl -fsSL https://cli.kiro.dev/install | bash
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v kiro-cli
          kiro-cli --version

      - name: Sync external skill repo
