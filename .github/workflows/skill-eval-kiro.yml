          Timing requirements:
          - Record wall-clock timestamps (ISO 8601 UTC) for each case.
          - Track two phases separately:
            - "Task execution": from agent receiving the prompt to delivering its final answer (this is the time the AI agent spent working on the user's request).
            - "Verification": from evidence collection start to all artifacts written (this is the time spent checking the agent's work).
          - In report.md, include a "## Timing" section with a human-readable table:
            | case_id | task_execution | verification | total |
            Use human-friendly durations like "3m 12s" instead of raw seconds.
          - In each case-results/<case_id>.json, include:
            - "task_started_at", "task_completed_at", "task_duration_s"
            - "verification_started_at", "verification_completed_at", "verification_duration_s"
            - "total_duration_s"

          Report quality requirements:
          - report.md must be useful to a human reading it for the first time.
          - For each failed assertion, explain WHAT went wrong with specifics:
            - Quote the actual command or output that was observed (or missing).
            - Example good: "Agent wrote .env.local but AGORA_APP_ID was empty because $AGORA_APP_ID was not exported in the shell."
            - Example bad: "Env mapping assertion failed."
          - For each passed assertion, include a one-line evidence summary.
          - The "Suggested Next Fixes" section must include concrete actions, not just file paths:
