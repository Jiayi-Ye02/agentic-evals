name: Skill Evaluation

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: "Target to evaluate (e.g. agora)"
        required: true
        default: "agora"
      suite_ids:
        description: "Comma-separated suite IDs, or 'all' for defaults"
        required: false
        default: "all"
      case_id:
        description: "Single case ID (leave empty for full suite)"
        required: false
        default: ""
      model:
        description: "Model for Codex"
        required: false
        default: ""
      run_mode:
        description: "single-run or ab-urls"
        required: false
        default: "single-run"
        type: choice
        options:
          - single-run
          - ab-urls
      execution_runtime:
        description: "Execution runtime under test"
        required: false
        default: "codex"
        type: choice
        options:
          - codex
          - kiro
      variant_a_url:
        description: "Variant A URL (ab-urls only)"
        required: false
        default: ""
      variant_b_url:
        description: "Variant B URL (ab-urls only)"
        required: false
        default: ""
      skill_repo:
        description: "GitHub owner/repo of the skill repo (e.g. AgoraIO/skills)"
        required: false
        default: ""
      skill_repo_ref:
        description: "Git ref (branch/tag/sha) of the skill repo to test"
        required: false
        default: ""

  pull_request:
    paths:
      - "targets/**/*.yaml"
      - ".agents/skills/**"

env:
  TARGET_ID: ${{ github.event.inputs.target_id || 'agora' }}
  EXECUTION_RUNTIME: ${{ github.event.inputs.execution_runtime || 'codex' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Validate YAML
        env:
          TARGET_ID: ${{ env.TARGET_ID }}
        run: |
          ruby -e '
            require "yaml"
            tid = ENV.fetch("TARGET_ID")
            Dir["targets/#{tid}/cases/*/suite.yaml"].sort.each { |f| YAML.load_file(f) }
            Dir["targets/#{tid}/cases/**/*.yaml"].sort.reject { |f| f.end_with?("suite.yaml") }.each { |f| YAML.load_file(f) }
            YAML.load_file("targets/#{tid}/target.yaml")
            puts "yaml-ok"
          '

  evaluate:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared runtime dependencies
        run: |
          pip install pyyaml
          npm install -g agent-browser

      - name: Validate Kiro headless prerequisites
        if: env.EXECUTION_RUNTIME == 'kiro'
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          [ -n "$KIRO_API_KEY" ] || {
            echo "::error::execution_runtime=kiro requires the KIRO_API_KEY secret"
            exit 1
          }

      - name: Install Kiro CLI
        if: env.EXECUTION_RUNTIME == 'kiro'
        run: |
          curl -fsSL https://cli.kiro.dev/install | bash
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v kiro-cli
          kiro-cli --version

      - name: Sync external skill repo
        env:
          TARGET_ID: ${{ env.TARGET_ID }}
          SKILL_REPO: ${{ github.event.inputs.skill_repo || 'AgoraIO/skills' }}
          SKILL_REF: ${{ github.event.inputs.skill_repo_ref || 'main' }}
          SKILL_REPO_INPUT: ${{ github.event.inputs.skill_repo || '' }}
          SKILL_REF_INPUT: ${{ github.event.inputs.skill_repo_ref || '' }}
        run: |
          TARGET_SKILL_DIR=".agents/skills/${TARGET_ID}"
          SOURCE_SKILL_DIR="/tmp/skill-repo/skills/${TARGET_ID}"
          FORCE_SYNC=0

          if [ -n "$SKILL_REPO_INPUT" ] || [ -n "$SKILL_REF_INPUT" ]; then
            FORCE_SYNC=1
          fi

          if [ "$FORCE_SYNC" -eq 0 ] && [ -f "${TARGET_SKILL_DIR}/SKILL.md" ]; then
            echo "Target skill already present at ${TARGET_SKILL_DIR}, skipping sync"
            exit 0
          fi

          echo "Cloning skill repo for target ${TARGET_ID}: ${SKILL_REPO} @ ${SKILL_REF}"
          rm -rf /tmp/skill-repo
          git clone "https://github.com/${SKILL_REPO}.git" /tmp/skill-repo
          git -C /tmp/skill-repo checkout "${SKILL_REF}"

          rm -rf "${TARGET_SKILL_DIR}"
          mkdir -p "${TARGET_SKILL_DIR}"
          if [ -d "${SOURCE_SKILL_DIR}" ]; then
            cp -r "${SOURCE_SKILL_DIR}"/. "${TARGET_SKILL_DIR}/"
          else
            echo "::error::skills/${TARGET_ID}/ not found in skill repo ${SKILL_REPO}"
            exit 1
          fi
          echo "Skill synced to ${TARGET_SKILL_DIR} from ${SKILL_REPO}@${SKILL_REF}"

      - name: Build evaluator prompt
        env:
          SUITE_IDS: ${{ github.event.inputs.suite_ids || 'all' }}
          CASE_ID: ${{ github.event.inputs.case_id || '' }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'single-run' }}
          EXECUTION_RUNTIME: ${{ env.EXECUTION_RUNTIME }}
          VARIANT_A_URL: ${{ github.event.inputs.variant_a_url || '' }}
          VARIANT_B_URL: ${{ github.event.inputs.variant_b_url || '' }}
        run: |
          cat > /tmp/eval-prompt.txt << 'HEREDOC'
          You are the skill-eval evaluator agent.

          Instructions:
          1. Read AGENT.md (canonical repo contract).
          2. Read .agents/skills/skills-evaluation/SKILL.md (operational instructions).
          3. Read docs/session-evidence.md (evidence contract).
          4. Follow the SKILL.md workflow exactly.

          Key rules:
          - Create isolated workspaces via the helper script:
            bash .agents/skills/skills-evaluation/scripts/create_case_workspace.sh
          - Write all artifacts under runs/<run_id>/.
          HEREDOC

          if [ "$EXECUTION_RUNTIME" = "codex" ]; then
            cat >> /tmp/eval-prompt.txt << 'HEREDOC'
          - Use spawn_agent with fork_context: false for each case.
          - Do NOT use codex exec as a substitute for per-case execution.
          - Collect evidence from ~/.codex/sessions/ after each sub-agent completes.
          HEREDOC
          else
            cat >> /tmp/eval-prompt.txt << 'HEREDOC'
          - Keep Codex as the evaluator and judge.
          - Execute each case with Kiro, not spawn_agent.
          - For each case, write the local Kiro hook agent via:
            python3 scripts/write_kiro_hook_agent.py "<workspace>" --target-id "<target_id>"
          - Set KIRO_HOOK_TRACE_PATH per case and capture raw hook events to raw-hook-trace.jsonl.
          - Run kiro-cli chat --no-interactive --agent skill-eval-kiro-runtime --trust-all-tools.
          - Capture stdout to final-answer.txt and derive accepted-session.json with normalize_kiro_hook_trace.py.
          - If hook capture is missing or unreliable, mark the case blocked instead of judging from summaries.
          HEREDOC
          fi

          echo "" >> /tmp/eval-prompt.txt
          echo "Run parameters:" >> /tmp/eval-prompt.txt
          echo "- test repo path: $(pwd)" >> /tmp/eval-prompt.txt
          echo "- target_id: ${TARGET_ID}" >> /tmp/eval-prompt.txt
          echo "- run_mode: ${RUN_MODE}" >> /tmp/eval-prompt.txt
          echo "- execution_runtime: ${EXECUTION_RUNTIME}" >> /tmp/eval-prompt.txt

          if [ "$SUITE_IDS" != "all" ]; then
            echo "- suite_ids: ${SUITE_IDS}" >> /tmp/eval-prompt.txt
          else
            echo "- suite_ids: use target defaults" >> /tmp/eval-prompt.txt
          fi

          if [ -n "$CASE_ID" ]; then
            echo "- case_id: ${CASE_ID}" >> /tmp/eval-prompt.txt
          fi

          if [ "$RUN_MODE" = "ab-urls" ]; then
            echo "- variant_a_url: ${VARIANT_A_URL}" >> /tmp/eval-prompt.txt
            echo "- variant_b_url: ${VARIANT_B_URL}" >> /tmp/eval-prompt.txt
          fi

          echo "" >> /tmp/eval-prompt.txt
          echo "Begin the evaluation now." >> /tmp/eval-prompt.txt

      - name: Run Codex evaluator
        id: run_codex
        uses: openai/codex-action@v1
        env:
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.RESPONSES_API_ENDPOINT }}
          prompt-file: /tmp/eval-prompt.txt
          sandbox: danger-full-access
          model: ${{ github.event.inputs.model || '' }}

      - name: Locate run artifacts
        id: artifacts
        run: |
          LATEST_RUN=$(ls -td runs/*/ 2>/dev/null | head -1)
          if [ -z "$LATEST_RUN" ]; then
            echo "::warning::No run directory found"
            echo "run_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_dir=${LATEST_RUN}" >> "$GITHUB_OUTPUT"
          echo "run_found=true" >> "$GITHUB_OUTPUT"
          [ -f "${LATEST_RUN}/report.md" ] \
            && echo "report_exists=true" >> "$GITHUB_OUTPUT" \
            || echo "report_exists=false" >> "$GITHUB_OUTPUT"

      - name: Upload run artifacts
        if: steps.artifacts.outputs.run_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-${{ env.TARGET_ID }}-${{ github.run_id }}
          path: ${{ steps.artifacts.outputs.run_dir }}
          retention-days: 30

      - name: Post report to job summary
        if: steps.artifacts.outputs.report_exists == 'true'
        run: |
          echo "## Skill Eval Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.artifacts.outputs.run_dir }}/report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Post report as PR comment
        if: >
          github.event_name == 'pull_request' &&
          steps.artifacts.outputs.report_exists == 'true'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.artifacts.outputs.run_dir }}/report.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Skill Eval Report\n\n${report}`,
            });

      - name: Check for failures
        if: steps.artifacts.outputs.run_found == 'true'
        run: |
          RUN_DIR="${{ steps.artifacts.outputs.run_dir }}"
          RESULTS_DIR="${RUN_DIR}/case-results"
          [ -d "$RESULTS_DIR" ] || { echo "::warning::No case-results"; exit 0; }
          FAIL=$(grep -rl '"status": "fail"' "$RESULTS_DIR" 2>/dev/null | wc -l)
          PASS=$(grep -rl '"status": "pass"' "$RESULTS_DIR" 2>/dev/null | wc -l)
          BLOCKED=$(grep -rl '"status": "blocked"' "$RESULTS_DIR" 2>/dev/null | wc -l)
          echo "Results: ${PASS} pass, ${FAIL} fail, ${BLOCKED} blocked"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::${FAIL} case(s) failed"
            exit 1
          fi
