target_id: "voice-ai-integration"
entry_skill: ".agents/skills/voice-ai-integration/SKILL.md"

roots:
  - ".agents/skills/voice-ai-integration/references"
  - ".agents/skills/voice-ai-integration/scripts"

default_suites:
  - "bootstrap"
  - "routing"
  - "workflow"

# Suite definitions live alongside their cases:
#   cases/<suite_id>/suite.yaml
suite_root: "cases"

artifact_contract:
  required:
    - "manifest.json"
    - "case-artifacts/<case_id>/accepted-session.json"
    - "case-artifacts/<case_id>/final-answer.txt"
    - "transcript.md"
    - "case-results/<case_id>.json"
    - "report.md"

allowed_statuses:
  - "pass"
  - "fail"
  - "blocked"

focus_areas:
  - "bootstrap"
  - "routing"
  - "workflow"
