case_id: "convoai-consolidated-checklist"
title: "Use the mandatory one-shot ConvoAI checklist before implementation"

input:
  user_prompt: "我想做一个 AI 语音助手，用声网 ConvoAI。"
  locale: "zh-CN"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/intake/convoai.md"
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/conversational-ai/README.md"
    - type: "route"
      value: "convoai-primary"
    - type: "reviewer_check"
      prompt: "Did the assistant present one consolidated numbered ConvoAI checklist that covers the missing LLM, TTS, ASR, and ASR language details before moving into implementation, instead of fragmenting intake across multiple turns?"
    - type: "reviewer_check"
      prompt: "Did the assistant keep the response aligned with the supported ConvoAI path by referencing the agent-server-sdk and agora-agent-client-toolkit instead of jumping straight into an unsupported custom architecture?"

  forbidden: []

notes:
  why_it_matters: "The ConvoAI path depends on a single structured intake pass before architecture advice."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/intake/convoai.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/README.md"
