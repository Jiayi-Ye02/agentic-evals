case_id: "convoai-native-ios-no-backend-no-server"
title: "Native iOS ConvoAI should avoid backend intake and point to the no-server path"

input:
  user_prompt: "I'm building an iOS ConvoAI voice assistant."
  locale: "en-US"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/intake/convoai.md"
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/conversational-ai/sample-repos.md"
    - type: "route"
      value: "convoai-primary"
    - type: "reviewer_check"
      prompt: "For a native iOS ConvoAI request, did the assistant avoid asking about backend setup, ask only for the unresolved LLM, TTS, ASR, and ASR language details, and point the user to the native sample or direct-client path with no separate server?"

  forbidden: []

notes:
  why_it_matters: "Native ConvoAI has different implementation constraints from web/server paths and should not inherit unnecessary backend intake."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/intake/convoai.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/sample-repos.md"
