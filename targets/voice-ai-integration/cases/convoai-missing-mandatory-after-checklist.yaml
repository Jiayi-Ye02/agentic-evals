case_id: "convoai-missing-mandatory-after-checklist"
title: "If one mandatory checklist field is missing, ask only for that field"

input:
  user_prompt: "I need a customer support ConvoAI agent for Web.\n\nFollow-up from user: 1F 2E 3G 4G"
  locale: "en-US"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/intake/convoai.md"
    - type: "route"
      value: "convoai-primary"
    - type: "reviewer_check"
      prompt: "After the partial reply '1F 2E 3G 4G', did the assistant ask only for the missing ASR language instead of repeating the full checklist or reopening already-resolved items?"

  forbidden: []

notes:
  why_it_matters: "This protects the narrow-repair behavior that keeps ConvoAI intake efficient after a mostly complete reply."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/intake/convoai.md"
