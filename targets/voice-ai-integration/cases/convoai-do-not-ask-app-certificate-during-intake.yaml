case_id: "convoai-do-not-ask-app-certificate-during-intake"
title: "Default ConvoAI intake should not ask for App Certificate"

input:
  user_prompt: "我想做一个 ConvoAI Web 语音助手。"
  locale: "zh-CN"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/intake/convoai.md"
    - type: "route"
      value: "convoai-primary"
    - type: "reviewer_check"
      prompt: "During the default ConvoAI intake, did the assistant avoid asking for App Certificate as an intake blocker?"

  forbidden: []

notes:
  why_it_matters: "This prevents the intake flow from drifting into irrelevant setup questions before the core ConvoAI spec is established."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/intake/convoai.md"
