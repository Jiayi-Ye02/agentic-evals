case_id: "sample-repo-unavailable"
title: "If the official ConvoAI sample is unavailable, report it and fall back to docs"

input:
  user_prompt: "Integrate ConvoAI for web using the official sample."
  locale: "en-US"

setup:
  docs_index_present: true
  network_mode: "restricted"
  sample_repo_available: false

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/conversational-ai/sample-repos.md"
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi.md"
    - type: "source_order"
      first: ".agents/skills/voice-ai-integration/references/conversational-ai/sample-repos.md"
      before: ".agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi.md"
    - type: "reviewer_check"
      prompt: "If the official sample repo was unavailable, did the assistant explicitly report the repo access failure, provide the repo URL, and continue with a docs-based fallback instead of silently ignoring the failure?"

  forbidden: []

notes:
  why_it_matters: "The supported path is sample-first, but failure handling still needs to degrade cleanly into docs-backed guidance."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/references/conversational-ai/sample-repos.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi.md"
