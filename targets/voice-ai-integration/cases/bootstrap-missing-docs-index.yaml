case_id: "bootstrap-missing-docs-index"
title: "When docs.txt is missing, attempt Step 0 before routing"

input:
  user_prompt: "我想做一个 Web 端 AI 语音助手，后端 Python。"
  locale: "zh-CN"

setup:
  docs_index_present: false

assert:
  summary: "When the docs index is missing, the assistant should attempt Step 0 bootstrap before moving into routing or intake."
  required:
    - description: "The accepted session evidence should show that the top-level skill instructions defining Step 0 were consulted."
      pass_criteria:
        - "The accepted session evidence shows consultation of `.agents/skills/voice-ai-integration/SKILL.md`."
      fail_signals:
        - "The accepted session evidence never shows consultation of `.agents/skills/voice-ai-integration/SKILL.md`"
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The accepted session evidence should show that the docs bootstrap step was attempted."
      pass_criteria:
        - "The accepted session evidence shows a command invoking `fetch-docs.sh` or an equivalent Step 0 bootstrap action."
      fail_signals:
        - "The accepted session evidence shows no docs bootstrap attempt"
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The accepted session evidence should show that bootstrap happened before any product-module reference guidance was consulted."
      pass_criteria:
        - "The accepted session evidence shows the docs bootstrap attempt before any product-module README or reference file is consulted."
      fail_signals:
        - "The accepted session evidence shows product-module guidance consulted before the docs bootstrap attempt"
      evidence_scope:
        - "accepted-session.jsonl"

  forbidden: []

notes:
  why_it_matters: "Step 0 is mandatory in the target skill. Skipping it weakens all later doc-fetch behavior."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/SKILL.md"
    - ".agents/skills/voice-ai-integration/scripts/fetch-docs.sh"
