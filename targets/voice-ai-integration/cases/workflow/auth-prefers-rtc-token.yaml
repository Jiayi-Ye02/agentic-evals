case_id: "auth-prefers-rtc-token"
title: "Recommend RTC Token as the default ConvoAI auth path"

input:
  user_prompt: "ConvoAI auth: should I use Basic Auth or token?"
  locale: "en-US"

setup:
  docs_index_present: false

assert:
  summary: "ConvoAI auth guidance should recommend RTC Token by default and treat Basic Auth as a fallback."
  required:
    - description: "The accepted session evidence should show that shared Shengwang auth guidance and at least one ConvoAI-specific auth source were consulted."
      pass_criteria:
        - "The accepted session evidence shows consultation of `.agents/skills/voice-ai-integration/references/general/credentials-and-auth.md`."
        - "The accepted session evidence also shows consultation of at least one ConvoAI-specific auth source, such as `.agents/skills/voice-ai-integration/references/conversational-ai/README.md` or `.agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi/index.mdx`."
      fail_signals:
        - "The accepted session evidence never consults the shared credentials/auth guidance."
        - "The accepted session evidence never consults any ConvoAI-specific auth source."
      evidence_scope:
        - "accepted-session.json"
    - description: "The final answer should make RTC Token the default recommendation."
      pass_criteria:
        - "Recommends RTC Token as the default ConvoAI authentication path"
        - "Presents Basic Auth only as a fallback or special-case option"
      fail_signals:
        - "Presents Basic Auth as the default recommendation"
        - "Fails to distinguish the preferred default from the fallback"
      evidence_scope:
        - "final-answer.txt"
        - "accepted-session.json"

  forbidden: []

notes:
  why_it_matters: "Auth guidance is security-sensitive and the default recommendation should follow the supported token path."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/references/general/credentials-and-auth.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/README.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi/index.mdx"
