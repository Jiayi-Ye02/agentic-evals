case_id: "route-rtc"
title: "A human video-call request should route to RTC rather than ConvoAI"

input:
  user_prompt: "我想做一个 Web 端多人视频通话，不需要 AI agent。"
  locale: "zh-CN"

setup:
  docs_index_present: false

assert:
  summary: "A non-AI human video-call request should stay on the RTC path and avoid the ConvoAI-specific quickstart flow."
  required:
    - description: "The accepted session evidence should show that the RTC module guidance was consulted."
      pass_criteria:
        - "The accepted session evidence shows consultation of `.agents/skills/voice-ai-integration/references/rtc/README.md`."
      fail_signals:
        - "The accepted session evidence never shows consultation of `.agents/skills/voice-ai-integration/references/rtc/README.md`"
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The final answer should clearly commit to the RTC-primary route."
      pass_criteria:
        - "Treats the request as an ordinary RTC video-call implementation rather than an AI-agent or ConvoAI path"
      fail_signals:
        - "Routes the request toward ConvoAI-primary or another AI-agent-specific path"
      evidence_scope:
        - "final-answer.txt"
        - "accepted-session.jsonl"
    - description: "The final answer should stay on the RTC path and avoid ConvoAI-specific quickstart or AI-agent gating."
      pass_criteria:
        - "Keeps the request on an ordinary RTC implementation path"
        - "Avoids switching into the ConvoAI-specific consolidated intake or AI-agent architecture flow"
      fail_signals:
        - "Routes the request into ConvoAI-specific handling"
        - "Starts asking ConvoAI checklist questions such as LLM, TTS, or ASR choices for this clearly non-AI request"
      evidence_scope:
        - "final-answer.txt"

  forbidden: []

notes:
  why_it_matters: "This catches false-positive ConvoAI routing on ordinary RTC requests."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/SKILL.md"
    - ".agents/skills/voice-ai-integration/references/rtc/README.md"
