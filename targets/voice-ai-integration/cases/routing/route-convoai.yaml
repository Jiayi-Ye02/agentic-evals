case_id: "route-convoai"
title: "A real-time AI voice bot request should route to ConvoAI-first handling"

input:
  user_prompt: "我想做一个语音客服机器人，需要实时对话，前端先做 Web。"
  locale: "zh-CN"

setup:
  docs_index_present: false

assert:
  summary: "A real-time AI voice bot request should route into the ConvoAI-first path and enter the ConvoAI module rather than the RTC-only path."
  required:
    - description: "The accepted session evidence should show that the ConvoAI module was consulted for the request."
      pass_criteria:
        - "The accepted session evidence shows consultation of `.agents/skills/voice-ai-integration/references/conversational-ai/README.md`."
      fail_signals:
        - "The accepted session evidence never shows consultation of `.agents/skills/voice-ai-integration/references/conversational-ai/README.md`"
      evidence_scope:
        - "accepted-session.json"
    - description: "The final answer should clearly treat the request as a ConvoAI use case rather than an RTC-only flow."
      pass_criteria:
        - "Treats the request as a real-time AI voice bot that belongs on the ConvoAI path"
      fail_signals:
        - "Routes the request toward RTC-primary or another non-ConvoAI primary path"
      evidence_scope:
        - "final-answer.txt"
        - "accepted-session.json"

  forbidden: []

notes:
  why_it_matters: "ConvoAI now has its own routing and quickstart workflow. Wrong routing causes the rest of the interaction to drift onto the RTC-only path."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/SKILL.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/README.md"
