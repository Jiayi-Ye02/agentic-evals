case_id: "convoai-join-token-not-rest-auth"
title: "Clarify that the ConvoAI join token is for RTC, not REST auth"

input:
  user_prompt: "In ConvoAI /join, is the token field for REST auth or the RTC channel?"
  locale: "en-US"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi.md"
    - type: "reviewer_check"
      prompt: "Did the assistant clearly explain that the /join body token is for the RTC channel rather than REST authentication, and mention the empty string value when an RTC channel token is not needed?"

  forbidden: []

notes:
  why_it_matters: "Confusing the RTC token with REST authentication leads to broken requests and poor debugging advice."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/references/conversational-ai/convoai-restapi.md"
