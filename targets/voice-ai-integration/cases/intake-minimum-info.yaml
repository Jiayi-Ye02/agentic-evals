case_id: "intake-minimum-info"
title: "Do not re-ask routing blockers that the user already provided"

input:
  user_prompt: "我想做一个 Web 端 1v1 视频通话，用 RTC JavaScript SDK。"
  locale: "zh-CN"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/intake/README.md"
    - type: "route"
      value: "rtc-primary"
    - type: "reviewer_check"
      prompt: "Did the assistant avoid asking again for the use case, primary product, or platform when those fields were already explicit in the user request?"

  forbidden: []

notes:
  why_it_matters: "The target skill explicitly says to ask only for missing details. Repeating intake lowers trust and wastes turns."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/intake/README.md"
