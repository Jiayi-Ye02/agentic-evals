case_id: "docs-index-fetch-failure-fallback"
title: "If docs index download fails, report it and continue with local ConvoAI references"

input:
  user_prompt: "How should I integrate Shengwang ConvoAI for a web app?"
  locale: "en-US"

setup:
  docs_index_present: false
  network_mode: "offline"
  force_fetch_failure: true

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/SKILL.md"
    - type: "command_executed"
      argv_prefix:
        - "bash"
        - "skills/voice-ai-integration/scripts/fetch-docs.sh"
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/conversational-ai/README.md"
    - type: "reviewer_check"
      prompt: "If the docs index download failed, did the assistant explicitly report the failure and then continue with local ConvoAI references or fallback URLs instead of silently pretending the docs were available?"

  forbidden: []

notes:
  why_it_matters: "This checks that docs bootstrap failures are surfaced honestly without blocking all ConvoAI guidance."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/SKILL.md"
    - ".agents/skills/voice-ai-integration/references/doc-fetching.md"
    - ".agents/skills/voice-ai-integration/references/conversational-ai/README.md"
