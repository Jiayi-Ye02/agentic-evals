case_id: "source-order-local-first"
title: "Use local references before doc fetching when local docs are sufficient"

input:
  user_prompt: "帮我做一个 Node.js 的 RTC token server。"
  locale: "zh-CN"

setup:
  docs_index_present: true
  network_mode: "restricted"

assert:
  required:
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/SKILL.md"
    - type: "file_read"
      path: ".agents/skills/voice-ai-integration/references/token-server/README.md"
    - type: "source_order"
      first: ".agents/skills/voice-ai-integration/references/token-server/README.md"
      before: ".agents/skills/voice-ai-integration/references/doc-fetching.md"
    - type: "route"
      value: "token-server-primary"

  forbidden:
    - type: "command_executed"
      argv_prefix:
        - "bash"
        - "skills/voice-ai-integration/scripts/fetch-doc-content.sh"

notes:
  why_it_matters: "The target skill says local references are the default starting point. Fetching docs too early is wasted work and increases failure surface."
  likely_fix_files:
    - ".agents/skills/voice-ai-integration/SKILL.md"
    - ".agents/skills/voice-ai-integration/references/doc-fetching.md"
