case_id: "route-vague-to-intake"
title: "A vague multi-product request should route through intake"

input:
  user_prompt: "I want to build a real-time app with video, chat, and maybe some AI features."
  locale: "en-US"

setup: {}

assert:
  summary: "A vague request that spans multiple products should go through intake/SKILL.md for needs analysis before routing to a specific product."
  required:
    - description: "The accepted session evidence should show that the intake skill was consulted."
      pass_criteria:
        - "The accepted session evidence shows consultation of `.agents/skills/agora/intake/SKILL.md`."
      fail_signals:
        - "The accepted session evidence never consults `.agents/skills/agora/intake/SKILL.md`."
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The final answer should attempt to clarify the user's needs or present a product analysis rather than jumping into one product's implementation."
      pass_criteria:
        - "The answer asks clarifying questions about the user's use case, or presents a needs analysis identifying primary and supporting products."
      fail_signals:
        - "The answer immediately jumps into implementation code for a single product without clarifying the multi-product need."
      evidence_scope:
        - "final-answer.txt"

  forbidden: []

notes:
  why_it_matters: "SKILL.md says vague or multi-product requests must go through intake. Skipping intake causes wrong product routing."
  likely_fix_files:
    - ".agents/skills/agora/SKILL.md"
    - ".agents/skills/agora/intake/SKILL.md"
