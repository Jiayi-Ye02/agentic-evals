case_id: "convoai-e2e-first-success"
title: "End-to-end ConvoAI quickstart: clone, configure, run, verify"

input:
  user_prompt: |
    I want to build a Web demo where I can talk to an AI voice agent.

    To save time, here is everything you need:
    - I want to use the official full-stack Next.js quickstart (Path A).
    - I have my App ID, App Certificate, and ConvoAI is activated. All ready.
    - Use the reseller defaults (no vendor API keys needed).
    - My Agora credentials are set in environment variables:
      AGORA_APP_ID, AGORA_APP_CERTIFICATE.

    Please clone the repo, set it up, and start the dev server.
    Tell me the local URL when it's ready.
  locale: "en-US"

setup:
  env_vars_required:
    - "AGORA_APP_ID"
    - "AGORA_APP_CERTIFICATE"
  env_vars_notes: "The demo may use different env var names (e.g. NEXT_PUBLIC_AGORA_APP_ID). The agent should map from AGORA_APP_ID/AGORA_APP_CERTIFICATE to whatever the demo expects."

assert:
  summary: "The agent should clone the official quickstart, configure credentials, start the dev server, and report a working local URL."
  required:
    - description: "The official Next.js quickstart repo is cloned."
      pass_criteria:
        - "Session evidence shows a git clone command targeting `agent-quickstart-nextjs` or the GitHub URL `https://github.com/AgoraIO-Conversational-AI/agent-quickstart-nextjs`."
        - "A directory exists in the workspace containing the quickstart files (package.json with agora dependencies, app/api/invite-agent/, etc.) regardless of the directory name."
      fail_signals:
        - "No clone command observed — agent generates code from scratch."
        - "Agent clones a different repo that is not the official quickstart."
      evidence_scope:
        - "accepted-session.jsonl"
        - "workspace-files"

    - description: "Agora credentials are configured in the demo's env file."
      pass_criteria:
        - "Session evidence shows the agent writing a .env or .env.local file with non-empty Agora App ID and App Certificate values."
        - "The env file exists somewhere in the workspace (search recursively for .env.local or .env) and contains NEXT_PUBLIC_AGORA_APP_ID and NEXT_AGORA_APP_CERTIFICATE with non-placeholder values."
      fail_signals:
        - "No env file is written anywhere in the workspace."
        - "Env file contains empty or placeholder values (e.g. your_agora_app_id)."
      evidence_scope:
        - "accepted-session.jsonl"
        - "workspace-files"

    - description: "A dev server is started and a local URL is reported."
      pass_criteria:
        - "Session evidence shows a dev server start command (pnpm dev, npm run dev, or equivalent)."
        - "The final answer includes a local URL (e.g. http://localhost:3000), OR a process is listening on port 3000 at verification time."
      fail_signals:
        - "No dev server start command observed."
        - "Final answer does not mention a running URL and no process is listening on port 3000."
      evidence_scope:
        - "accepted-session.jsonl"
        - "final-answer.txt"
        - "evaluator-verification"

    - description: "The demo page loads successfully in a browser."
      pass_criteria:
        - "The evaluator opens the reported URL and the page loads without errors."
      fail_signals:
        - "The page fails to load or returns an HTTP error."
        - "The browser console shows critical JavaScript errors."
      evidence_scope:
        - "evaluator-verification"

  forbidden: []

notes:
  why_it_matters: "This is the core first-success test. If the agent can clone, configure, and run the official quickstart with real credentials, the skill's ConvoAI guidance works end to end."
  likely_fix_files:
    - ".agents/skills/agora/references/conversational-ai/quickstarts.md"
    - ".agents/skills/agora/references/conversational-ai/README.md"
