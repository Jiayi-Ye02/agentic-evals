case_id: "convoai-e2e-first-success"
title: "End-to-end ConvoAI first-success: full intake → quickstart → run → verify"

input:
  user_prompt: |
    I want to build a Web demo where I can talk to an AI voice agent.

    To save time, here is everything you need:
    - I want to use the official full-stack Next.js quickstart (Path A).
    - I have my App ID, App Certificate, and ConvoAI is activated. All ready.
    - Use the reseller defaults (no vendor API keys needed).
    - My Agora credentials are set in environment variables:
      AGORA_APP_ID, AGORA_APP_CERTIFICATE.

    Please clone the repo, set it up, and start the dev server.
    Tell me the local URL when it's ready.
  locale: "en-US"

setup:
  env_vars_required:
    - "AGORA_APP_ID"
    - "AGORA_APP_CERTIFICATE"
  env_vars_notes: "The actual env var names in the demo may differ (e.g., NEXT_PUBLIC_AGORA_APP_ID, NEXT_AGORA_APP_CERTIFICATE). The evaluator should map AGORA_APP_ID and AGORA_APP_CERTIFICATE from the test environment to whatever names the cloned demo expects."

# Verification is split between the sub-agent and the evaluator:
# - Sub-agent: writes code, configures env, starts dev server, reports the URL.
# - Evaluator (main agent): opens the URL in a browser, interacts with the page,
#   checks for errors, and reports the final e2e result.
verification:
  owner: "evaluator"
  steps:
    - "After the sub-agent reports the dev server URL, open it in a headed (non-headless) browser — the browser must run in the foreground so media devices are available."
    - "Grant microphone/audio permission automatically (e.g., Playwright --use permissions=['microphone'] or equivalent browser launch flag)."
    - "Wait for the page to fully load."
    - "Click the start/connect button to initiate a conversation with the AI agent."
    - "Wait a few seconds for the agent connection to establish."
    - "Check the page and browser console for errors."
    - "Record the result: successful connection or error details."

assert:
  summary: "The sub-agent should follow the full ConvoAI first-success flow and deliver a running dev server. The evaluator then verifies the demo works end to end via browser interaction."
  required:
    - description: "The accepted session evidence should show the intake routing chain: SKILL.md → ConvoAI README → quickstarts.md."
      pass_criteria:
        - "The accepted session evidence shows consultation of `.agents/skills/agora/SKILL.md`."
        - "The accepted session evidence shows consultation of `.agents/skills/agora/references/conversational-ai/README.md`."
        - "The accepted session evidence shows consultation of `.agents/skills/agora/references/conversational-ai/quickstarts.md`."
      fail_signals:
        - "The accepted session evidence skips SKILL.md and goes directly to a product reference."
        - "The accepted session evidence never consults quickstarts.md."
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The sub-agent should recognize the pre-supplied gate answers and not re-ask resolved gates."
      pass_criteria:
        - "The sub-agent does not re-ask the baseline path choice (the user already said Path A)."
        - "The sub-agent does not re-ask project readiness (the user already confirmed all ready)."
        - "The sub-agent does not re-ask vendor defaults (the user already chose reseller defaults)."
      fail_signals:
        - "The sub-agent asks the user to choose a baseline path despite the user already specifying Path A."
        - "The sub-agent asks about App ID or App Certificate readiness despite the user confirming all ready."
        - "The sub-agent asks about provider choices despite the user choosing reseller defaults."
      evidence_scope:
        - "final-answer.txt"
        - "accepted-session.jsonl"
    - description: "The accepted session evidence should show the official Next.js quickstart repo being cloned."
      pass_criteria:
        - "The accepted session evidence shows a git clone command for `agent-quickstart-nextjs` or the equivalent GitHub URL."
      fail_signals:
        - "No clone command is observed — the sub-agent generates custom code from scratch instead of using the official sample."
        - "The sub-agent clones a different repo (e.g., agent-samples) instead of the Path A repo."
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The env config should correctly map the Agora credentials and not require vendor keys in reseller mode."
      pass_criteria:
        - "The Agora App ID and App Certificate are correctly mapped into the demo's .env file, regardless of the exact variable names used by the demo."
        - "The sub-agent does not require vendor API keys (Deepgram, OpenAI, ElevenLabs) since the user chose reseller defaults."
      fail_signals:
        - "The sub-agent requires or prompts for vendor API keys when the user chose reseller defaults."
        - "The Agora credentials are not configured in the demo's env file."
      evidence_scope:
        - "accepted-session.jsonl"
        - "final-answer.txt"
    - description: "The accepted session evidence should show a dev server being started."
      pass_criteria:
        - "The accepted session evidence shows a command starting the dev server (e.g., pnpm dev, npm run dev, or equivalent)."
      fail_signals:
        - "No dev server start command is observed."
      evidence_scope:
        - "accepted-session.jsonl"
    - description: "The sub-agent's final answer should report the local dev server URL."
      pass_criteria:
        - "The final answer includes a local URL (e.g., http://localhost:3000) where the demo is running."
      fail_signals:
        - "The final answer does not mention a URL or does not confirm the server is running."
      evidence_scope:
        - "final-answer.txt"
    - description: "The evaluator should verify the demo loads and the start button is clickable via browser interaction."
      pass_criteria:
        - "The evaluator's browser runs in headed (foreground) mode, not headless."
        - "The evaluator granted microphone/audio permission before interacting with the page."
        - "The page loaded successfully at the reported URL."
        - "The evaluator was able to locate and click the start/connect button on the page."
      fail_signals:
        - "The browser ran in headless mode, which blocks audio device access."
        - "Microphone permission was not granted, causing a permission error."
        - "The page fails to load or returns an error."
        - "No start/connect button is found on the page."
      evidence_scope:
        - "evaluator-verification"
    - description: "The evaluator should report the final e2e result after browser interaction."
      pass_criteria:
        - "The evaluator reports whether the agent connection was established or describes what errors occurred."
        - "If the browser console shows errors, they are captured and reported."
      fail_signals:
        - "No e2e verification result is reported by the evaluator."
      evidence_scope:
        - "evaluator-verification"

  forbidden: []

notes:
  why_it_matters: "This tests the entire first-success chain: routing → gated state machine → Path A clone → env config → run. The evaluator then independently verifies the output works, separating skill quality (sub-agent) from runtime correctness (evaluator browser check)."
  likely_fix_files:
    - ".agents/skills/agora/SKILL.md"
    - ".agents/skills/agora/references/conversational-ai/README.md"
    - ".agents/skills/agora/references/conversational-ai/quickstarts.md"
