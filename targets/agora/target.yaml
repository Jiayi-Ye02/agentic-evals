target_id: "agora"
entry_skill: ".agents/skills/agora/SKILL.md"

roots:
  - ".agents/skills/agora/references"
  - ".agents/skills/agora/intake"

default_suites:
  - "bootstrap"
  - "routing"
  - "workflow"

suite_root: "cases"

artifact_contract:
  required:
    - "manifest.json"
    - "case-artifacts/<case_id>/accepted-session.jsonl"
    - "case-artifacts/<case_id>/final-answer.txt"
    - "transcript.md"
    - "case-results/<case_id>.json"
    - "report.md"

allowed_statuses:
  - "pass"
  - "fail"
  - "blocked"

focus_areas:
  - "bootstrap"
  - "routing"
  - "workflow"
